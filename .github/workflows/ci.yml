name: CI/CD Pipeline
true:
  push:
    branches:
    - main
    - master
  pull_request:
    branches:
    - main
    - master
env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip
    - name: Install ruff
      run: pip install ruff
    - name: Run Ruff lint
      run: ruff check app/ tests/ --output-format=github
    - name: Run Ruff format check
      run: ruff format app/ tests/ --check
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip
    - name: Install dependencies
      run: 'pip install --upgrade pip

        pip install -r requirements.txt

        pip install pytest pytest-asyncio httpx

        '
    - name: Run tests
      run: pytest tests/ -v --tb=short
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
    - lint
    - test
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: "type=ref,event=branch\n            type=sha,prefix={{branch}}-\n  \
          \          type=raw,value=latest,enable={{is_default_branch}}"
    - uses: docker/build-push-action@v6
      with:
        context: .
        dockerfile: docker/Dockerfile
        push: ${{ github.event_name == 'push' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        timeout: 20m
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
    - build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Deploy via SSH
      if: secrets.DEPLOY_HOST != ''
      env:
        HOST: ${{ secrets.DEPLOY_HOST }}
        USER: ${{ secrets.DEPLOY_USER }}
        KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      run: "echo \"$KEY\" | base64 -d > /tmp/deploy_key\nchmod 600 /tmp/deploy_key\n\
        ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key \"$USER@$HOST\" \"\n  cd\
        \ /opt/llm-gateway &&\n  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME\
        \ }}:main &&\n  docker-compose up -d\n\"\nrm -f /tmp/deploy_key\n"
